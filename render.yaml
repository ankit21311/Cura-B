services:
	- type: web
		name: curab-web
		runtime: python
		plan: free
		buildCommand: pip install -r requirements.txt && python manage.py collectstatic --no-input
		startCommand: python manage.py migrate && gunicorn cura.wsgi:application
		envVars:
			- key: SECRET_KEY
				generateValue: true
			- key: DEBUG
				value: "False"
			- key: ALLOWED_HOSTS
				value: "*"
			- key: DATABASE_URL
				fromDatabase:
					name: curab-db
					property: connectionString

databases:
	- name: curab-db
		plan: free
