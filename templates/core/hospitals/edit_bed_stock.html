{% extends "base.html" %}
{% block content %}
<div class="auth-container" style="max-width: 600px; margin: 40px auto;">
    <div class="glass-card">
        <h2>Update Bed Availability</h2>
        <div style="margin-bottom: 20px;">
            <h4>{{ bed.hospital.name }}</h4>
            <p>{{ bed.get_bed_type_display }} Bed</p>
        </div>

        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label>Available Beds</label>
                <input type="number" name="available_beds" value="{{ bed.available_beds }}" class="form-control" min="0"
                    max="{{ bed.total_beds }}">
                <small>Max capacity: {{ bed.total_beds }}</small>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 16px;">Update</button>
            <a href="{% url 'manage_beds' %}" class="btn btn-outline"
                style="width: 100%; margin-top: 8px; justify-content: center;">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
