{% extends 'base.html' %}

{% block content %}
<div class="auth-container" style="max-width: 600px;">
    <div class="card">
        <h2>{{ title }}</h2>
        <form method="post">
            {% csrf_token %}

            {% for field in form %}
            <div class="form-group">
                <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                {{ field }}
                {% if field.help_text %}
                <small class="form-text text-muted">{{ field.help_text }}</small>
                {% endif %}
                {% for error in field.errors %}
                <div class="error-message">{{ error }}</div>
                {% endfor %}
            </div>
            {% endfor %}

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Save Bed Entry</button>
                <a href="{% url 'admin_manage_beds' %}" class="btn btn-ghost">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
