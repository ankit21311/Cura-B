{% extends "base.html" %}
{% block content %}
<div class="auth-container" style="max-width: 600px; margin: 40px auto;">
    <div class="glass-card">
        <h2>{{ title }}</h2>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 16px;">Save Stock</button>
            <a href="{% url 'manage_oxygen' %}" class="btn btn-outline"
                style="width: 100%; margin-top: 8px; justify-content: center;">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
